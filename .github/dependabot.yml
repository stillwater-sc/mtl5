version: 2
updates:
  # Keep GitHub Actions pinned to commit SHAs up to date. Dependabot bumps the
  # SHA and the trailing "# vX.Y.Z" comment together when a new release ships.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
