name: CI

on:
  push:
    branches: [ '**' ]
    tags: [ 'v[0-9]*' ]
  pull_request:
    branches: [ main ]

jobs:
  # -- ASCII guard: source files must contain only ASCII bytes ---------
  # Fails fast if any C++ source under include/, tests/, examples/
  # introduces non-ASCII (multibyte) characters.
  ascii-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for non-ASCII characters in source
        run: |
          # grep -l exits 0 (matches), 1 (no matches), >1 (execution error).
          # Don't mask >1 with '|| true' — a broken scan must fail CI, not pass.
          set +e
          hits=$(grep -rlP '[^\x00-\x7F]' \
            --include='*.hpp' --include='*.cpp' --include='*.h' \
            --include='*.cc' --include='*.cxx' \
            include tests examples)
          status=$?
          set -e
          if [ "$status" -gt 1 ]; then
            echo "ASCII scan failed to execute (grep exit $status)."
            exit "$status"
          fi
          if [ -n "$hits" ]; then
            echo "Non-ASCII characters found in:"
            echo "$hits"
            echo "Source files must be ASCII-only. See CONTRIBUTING / issue #59."
            exit 1
          fi
          echo "OK: all source files are ASCII-only."

  # -- Tier 1: Fast unit tests on all platforms (~2 min) ---------------
  # Runs on every push and every PR (draft or ready).
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ──────────────────────────────────────────────
          - os: ubuntu-24.04
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
            name: Linux x64 (GCC 13)

          - os: ubuntu-24.04
            compiler: clang
            cc: clang-18
            cxx: clang++-18
            name: Linux x64 (Clang 18)

          # ── Linux ARM64 ───────────────────────────────────────────────
          - os: ubuntu-24.04-arm
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
            name: Linux ARM64 (GCC 13)

          - os: ubuntu-24.04-arm
            compiler: clang
            cc: clang-18
            cxx: clang++-18
            name: Linux ARM64 (Clang 18)

          # ── macOS ARM64 (Apple Silicon) ───────────────────────────────
          - os: macos-14
            compiler: apple-clang
            cc: clang
            cxx: clang++
            name: macOS ARM64 (Apple Clang)

          - os: macos-15
            compiler: apple-clang
            cc: clang
            cxx: clang++
            name: macOS ARM64 (Apple Clang, latest)

          # ── Windows x86_64 ────────────────────────────────────────────
          - os: windows-2022
            compiler: msvc
            name: Windows x64 (MSVC 2022)

          - os: windows-2022
            compiler: clang-cl
            name: Windows x64 (Clang-CL)

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    # Use sccache (and its GitHub Actions cache) only on trusted runs: pushes
    # and same-repo PRs. Forked PRs leave it empty so they never write to the
    # shared GHA cache (zizmor cache-poisoning). An empty launcher == no launcher.
    env:
      SCCACHE_LAUNCHER: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'sccache' || '' }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up sccache
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Configure (Unix, GCC/Clang)
        if: runner.os != 'Windows'
        run: >
          cmake -B build
          -DCMAKE_CXX_STANDARD=20
          -DCMAKE_C_COMPILER=${{ matrix.cc }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
          -DCMAKE_C_COMPILER_LAUNCHER=${{ env.SCCACHE_LAUNCHER }}
          -DCMAKE_CXX_COMPILER_LAUNCHER=${{ env.SCCACHE_LAUNCHER }}
          -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows, MSVC)
        if: matrix.compiler == 'msvc'
        run: >
          cmake -B build
          -G "Visual Studio 17 2022" -A x64
          -DCMAKE_CXX_STANDARD=20
          -DCMAKE_C_COMPILER_LAUNCHER=${{ env.SCCACHE_LAUNCHER }}
          -DCMAKE_CXX_COMPILER_LAUNCHER=${{ env.SCCACHE_LAUNCHER }}

      - name: Configure (Windows, Clang-CL)
        if: matrix.compiler == 'clang-cl'
        run: >
          cmake -B build
          -G "Visual Studio 17 2022" -A x64
          -T ClangCL
          -DCMAKE_CXX_STANDARD=20
          -DCMAKE_C_COMPILER_LAUNCHER=${{ env.SCCACHE_LAUNCHER }}
          -DCMAKE_CXX_COMPILER_LAUNCHER=${{ env.SCCACHE_LAUNCHER }}

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --parallel

      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build -C Release --output-on-failure

  # ── Tier 2: Regression tests on Linux (~10 min) ─────────────────────
  # Runs only on non-draft PRs, after Tier 1 passes.
  # Exercises dense, sparse, and iterative solvers at 100–50K DOF.
  regression:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false
    needs: build
    runs-on: ubuntu-24.04

    # Same trusted-run gate as the build job (see note there): forked PRs skip
    # sccache so they cannot poison the shared GHA cache.
    env:
      SCCACHE_LAUNCHER: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'sccache' || '' }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up sccache
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Configure
        run: >
          cmake --preset ci-regression
          -DCMAKE_C_COMPILER=gcc-13
          -DCMAKE_CXX_COMPILER=g++-13
          -DCMAKE_C_COMPILER_LAUNCHER=${{ env.SCCACHE_LAUNCHER }}
          -DCMAKE_CXX_COMPILER_LAUNCHER=${{ env.SCCACHE_LAUNCHER }}

      - name: Build
        run: cmake --build build-ci-regression --parallel

      - name: Run regression tests
        run: >
          ctest --test-dir build-ci-regression
          -L regression
          --output-on-failure
          --timeout 300
